name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Moxygen
        run: npm install -g moxygen

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs and Plugins
        run: |
          pip install mkdocs mkdocs-material

      - name: Generate API Reference Docs
        run: |
          printf "INPUT=ewwii.h\nOPTIMIZE_OUTPUT_FOR_C=YES\nGENERATE_XML=YES\nGENERATE_HTML=NO\nGENERATE_LATEX=NO\nXML_OUTPUT=xml" | doxygen -
          
          mkdir -p docs
          moxygen --output docs/api.md xml/
          
          rm -rf xml/

      - name: Build MkDocs Site
        run: |
          mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
